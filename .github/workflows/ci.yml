name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libchromaprint-tools ffmpeg libsndfile1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          POCKETBASE_URL: http://localhost:8090
          POCKETBASE_ADMIN_EMAIL: test@test.com
          POCKETBASE_ADMIN_PASSWORD: testpassword
          NAS_MOUNT_PATH: /tmp/nas
          INGEST_BASE_PATH: /tmp/nas/downloads/unseeded/music
          MEDIA_LIBRARY_PATH: /tmp/nas/media/Music
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
